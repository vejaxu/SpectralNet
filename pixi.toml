[workspace]
name = "spectralnet"
version = "0.1.2"
description = "Spectral Clustering Using Deep Neural Networks"
channels = ["conda-forge", "pytorch"]
platforms = ["osx-arm64", "linux-64"]

[dependencies]
python = ">=3.11,<3.13"
pytorch = ">=2.0.0"
torchvision = ">=0.15.1"
numpy = ">=1.24"
scipy = ">=1.10.1"
scikit-learn = ">=1.2.2"
matplotlib = ">=3.7"
h5py = ">=3.8.0"
pip = "*"

[pypi-dependencies]
spectralnet = { path = ".", editable = true }
annoy = ">=1.17.1"
munkres = "*"
pytest = ">=7.0"
pytest-cov = "*"
tqdm = "*"

[tasks]
test = "pytest src/tests -v --tb=short"
test-fast = "pytest src/tests/test_models.py src/tests/test_losses.py src/tests/test_utils.py src/tests/test_metrics.py -v --tb=short"
